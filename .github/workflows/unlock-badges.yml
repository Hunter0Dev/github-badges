name: "\U0001F3C6 Unlock All GitHub Badges"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  discussions: write

jobs:
  unlock-badges:
    name: "\U0001F3C6 Unlock All 5 Badges"
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # STEP 0: SETUP - Enable Discussions on the repo
      # =========================================================
      - name: "\U0001F527 Enable Discussions on repo"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { repository } = await github.graphql(`
              query {
                repository(owner: "${owner}", name: "${repo}") {
                  id
                  hasDiscussionsEnabled
                }
              }
            `);

            if (!repository.hasDiscussionsEnabled) {
              await github.graphql(`
                mutation {
                  updateRepository(input: {
                    repositoryId: "${repository.id}",
                    hasDiscussionsEnabled: true
                  }) { repository { hasDiscussionsEnabled } }
                }
              `);
              console.log('✅ Discussions enabled on repo');
            } else {
              console.log('ℹ️ Discussions already enabled');
            }

      # =========================================================
      # STEP 1: PULL SHARK + YOLO (Merge 2 PRs without review)
      # =========================================================
      - name: "\U0001F988 Pull Shark + \U0001F920 YOLO"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;

            const { data: ref } = await github.rest.git.getRef({
              owner, repo,
              ref: `heads/${defaultBranch}`
            });
            const baseSha = ref.object.sha;

            for (let i = 1; i <= 2; i++) {
              const branchName = `badge/pull-shark-${i}-${Date.now()}`;

              // Create branch
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/heads/${branchName}`,
                sha: baseSha
              });

              // Create a file in the branch
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo,
                path: `.badges/pull-shark-${i}.md`,
                message: `feat: pull shark trigger ${i}`,
                content: Buffer.from(`# Pull Shark Trigger ${i}\nAutomated badge trigger.\n`).toString('base64'),
                branch: branchName
              });

              // Create PR
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                title: `feat: Pull Shark trigger ${i}`,
                head: branchName,
                base: defaultBranch,
                body: '🦈 Automated PR for Pull Shark badge (merged without review = YOLO)'
              });

              // Wait a moment for GitHub to process
              await new Promise(r => setTimeout(r, 2000));

              // Merge PR immediately without review (triggers YOLO)
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: pr.number,
                merge_method: 'merge'
              });

              // Clean up branch
              try {
                await github.rest.git.deleteRef({
                  owner, repo,
                  ref: `heads/${branchName}`
                });
              } catch (e) { /* branch may already be deleted */ }

              console.log(`✅ PR #${pr.number} created and merged without review`);
            }

            console.log('');
            console.log('🦈 Pull Shark: 2 PRs merged ✅');
            console.log('🤠 YOLO: PRs merged without review ✅');

      # =========================================================
      # STEP 2: QUICKDRAW (Open + close issue within 5 min)
      # =========================================================
      - name: "⚡ Quickdraw"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issue } = await github.rest.issues.create({
              owner, repo,
              title: '⚡ Quickdraw badge trigger',
              body: 'This issue is created and closed instantly to trigger the Quickdraw badge.'
            });

            await github.rest.issues.update({
              owner, repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

            console.log(`✅ Issue #${issue.number} created and closed instantly`);
            console.log('⚡ Quickdraw: Issue closed within seconds ✅');

      # =========================================================
      # STEP 3: PAIR EXTRAORDINAIRE (Co-authored commit in a PR)
      # =========================================================
      - name: "\U0001FAD1 Pair Extraordinaire"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;

            const { data: ref } = await github.rest.git.getRef({
              owner, repo,
              ref: `heads/${defaultBranch}`
            });
            const baseSha = ref.object.sha;

            const branchName = `badge/pair-extraordinaire-${Date.now()}`;

            // Create branch
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/heads/${branchName}`,
              sha: baseSha
            });

            // Get base commit and tree
            const { data: baseCommit } = await github.rest.git.getCommit({
              owner, repo,
              commit_sha: baseSha
            });

            // Create file blob
            const { data: blob } = await github.rest.git.createBlob({
              owner, repo,
              content: '# Pair Extraordinaire\nThis file was co-authored to trigger the badge.\n',
              encoding: 'utf-8'
            });

            // Create tree
            const { data: tree } = await github.rest.git.createTree({
              owner, repo,
              base_tree: baseCommit.tree.sha,
              tree: [{
                path: '.badges/pair-extraordinaire.md',
                mode: '100644',
                type: 'blob',
                sha: blob.sha
              }]
            });

            // Create commit with Co-authored-by trailer
            const { data: commit } = await github.rest.git.createCommit({
              owner, repo,
              message: 'feat: pair extraordinaire trigger\n\nCo-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>',
              tree: tree.sha,
              parents: [baseSha]
            });

            // Update branch to point to new commit
            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branchName}`,
              sha: commit.sha
            });

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: 'feat: Pair Extraordinaire - co-authored contribution',
              head: branchName,
              base: defaultBranch,
              body: '🫑 This PR contains a co-authored commit to trigger the Pair Extraordinaire badge.'
            });

            await new Promise(r => setTimeout(r, 2000));

            // Merge PR
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr.number,
              merge_method: 'merge'
            });

            // Clean up branch
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${branchName}`
              });
            } catch (e) { /* branch may already be deleted */ }

            console.log(`✅ Co-authored PR #${pr.number} merged`);
            console.log('🫑 Pair Extraordinaire: Co-authored PR merged ✅');

      # =========================================================
      # STEP 4: GALAXY BRAIN (Discussion answer marked as accepted)
      # Requires 2 accepted answers. User answers via PAT,
      # then github-actions[bot] marks them via GITHUB_TOKEN.
      # =========================================================
      - name: "\U0001F9E0 Galaxy Brain - Create discussions & answers (as you)"
        id: galaxy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get repo ID and Q&A category
            const { repository } = await github.graphql(`
              query {
                repository(owner: "${owner}", name: "${repo}") {
                  id
                  discussionCategories(first: 10) {
                    nodes { id name isAnswerable }
                  }
                }
              }
            `);

            const qaCategory = repository.discussionCategories.nodes.find(c => c.isAnswerable);
            if (!qaCategory) {
              core.setFailed('No Q&A discussion category found. Enable Discussions with a Q&A category.');
              return;
            }

            const questions = [
              {
                title: 'How do I earn GitHub profile badges?',
                body: 'What actions trigger GitHub achievement badges?',
                answer: 'GitHub badges are earned by: merging PRs (Pull Shark), closing issues quickly (Quickdraw), merging without review (YOLO), co-authoring PRs (Pair Extraordinaire), and getting discussion answers accepted (Galaxy Brain).'
              },
              {
                title: 'What is the best way to contribute to open source?',
                body: 'I want to start contributing. Where should I begin?',
                answer: 'Start by finding repos with good-first-issue labels. Read the CONTRIBUTING.md, fork the repo, make focused changes, and submit a clean PR with a clear description.'
              }
            ];

            const commentIds = [];

            for (const q of questions) {
              const createResult = await github.graphql(`
                mutation($repoId: ID!, $catId: ID!, $title: String!, $body: String!) {
                  createDiscussion(input: {
                    repositoryId: $repoId,
                    categoryId: $catId,
                    title: $title,
                    body: $body
                  }) { discussion { id number } }
                }
              `, {
                repoId: repository.id,
                catId: qaCategory.id,
                title: q.title,
                body: q.body
              });

              const discussionId = createResult.createDiscussion.discussion.id;
              const discussionNum = createResult.createDiscussion.discussion.number;

              const commentResult = await github.graphql(`
                mutation($discussionId: ID!, $body: String!) {
                  addDiscussionComment(input: {
                    discussionId: $discussionId,
                    body: $body
                  }) { comment { id } }
                }
              `, {
                discussionId: discussionId,
                body: q.answer
              });

              commentIds.push(commentResult.addDiscussionComment.comment.id);
              console.log(`✅ Discussion #${discussionNum} created and answered`);

              await new Promise(r => setTimeout(r, 1000));
            }

            core.setOutput('comment_ids', JSON.stringify(commentIds));

      - name: "\U0001F9E0 Galaxy Brain - Mark answers as accepted (as bot)"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentIds = JSON.parse(`${{ steps.galaxy.outputs.comment_ids }}`);

            for (const id of commentIds) {
              try {
                await github.graphql(`
                  mutation($commentId: ID!) {
                    markDiscussionCommentAsAnswer(input: { id: $commentId }) {
                      discussion { id }
                    }
                  }
                `, { commentId: id });

                console.log(`✅ Answer ${id} marked as accepted by github-actions[bot]`);
              } catch (e) {
                console.log(`⚠️ Could not mark answer: ${e.message}`);
              }
            }

            console.log('🧠 Galaxy Brain: 2 answers accepted by bot ✅');

      # =========================================================
      # STEP 5: SUMMARY
      # =========================================================
      - name: "\U0001F389 Summary"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║    🏆 ALL 5 BADGES TRIGGERED SUCCESSFULLY! 🏆   ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║                                                  ║"
          echo "║  🦈 Pull Shark          ✅ 2 PRs merged          ║"
          echo "║  🤠 YOLO                ✅ Merged without review  ║"
          echo "║  ⚡ Quickdraw            ✅ Issue closed instantly ║"
          echo "║  🫑 Pair Extraordinaire  ✅ Co-authored PR merged  ║"
          echo "║  🧠 Galaxy Brain         ✅ 2 answers accepted    ║"
          echo "║                                                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  ⏳ Badges may take a few hours to appear.       ║"
          echo "║  📝 Ensure badges are visible in your profile    ║"
          echo "║     settings: Settings → Profile → Achievements  ║"
          echo "╚══════════════════════════════════════════════════╝"
